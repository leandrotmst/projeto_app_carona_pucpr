<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro/Edição de Usuário</title>
</head>

<body>
    <div>
        <h1 id="form-titulo">Novo Usuário</h1>
        
        <form id="cadastroForm">
            <div>
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" required>
            </div>
            <div>
                <label for="telefone">Telefone</label>
                <input type="text" id="telefone" name="telefone" required>
            </div>
            <div>
                <label for="email">E-Mail</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div>
                <label for="endereco">Endereço</label>
                <input type="text" id="endereco" name="endereco" required>
            </div>
            
            <!-- CRUCIAL: O SELECT para o tipo de usuário -->
            <div>
                <label for="tipoUsuario">Eu sou:</label>
                <select id="tipoUsuario" name="tipoUsuario" required>
                    <option value="passageiro">Passageiro</option>
                    <option value="motorista">Motorista</option>
                </select>
            </div>

            <div>
                <label for="nasc">Data de Nascimento</label>
                <input type="date" id="nasc" name="nasc" required>
            </div>
            
            <!-- O contêiner que será ocultado/exibido pelo JS -->
            <div id="campoCarroContainer" style="border-top: 1px solid #ccc; padding-top: 15px; margin-top: 15px;">
                <h2>Detalhes do Veículo</h2>
                <div>
                    <label for="placaCarro">Placa do Carro</label>
                    <input type="text" id="placaCarro" name="placaCarro">
                </div>
                <div>
                    <label for="modeloCarro">Modelo do Carro</label>
                    <input type="text" id="modeloCarro" name="modeloCarro">
                </div>
                <div>
                    <label for="anoCarro">Ano do Carro</label>
                    <input type="number" id="anoCarro" name="anoCarro" min="1990" max="2099">
                </div>
            </div>

            <div>
                <button type="submit" id="enviar">Cadastrar</button>
            </div>
        </form>
    </div>
    <script src="../js/novo_usuario.js"></script>
</body>

</html>
